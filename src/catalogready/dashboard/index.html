<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Audit a product page for AI shopping readiness">
  <title>CatalogReady · Product AI-readiness audit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">CR</span>
      <span><strong>CatalogReady</strong><small data-i18n="tagline"></small></span>
    </div>
    <div class="topbar-side">
      <span class="badges" data-i18n="badges"></span>
      <select id="lang" class="lang-select" aria-label="Language">
        <option value="en">English</option>
        <option value="zh">中文</option>
      </select>
    </div>
  </header>

  <main class="layout">
    <section class="input-card">
      <h2 data-i18n="inputTitle"></h2>
      <label><span data-i18n="urlLabel"></span>
        <span class="url-row">
          <input id="url" type="url" placeholder="https://store.example/products/item" spellcheck="false">
          <button class="secondary" id="fetch" type="button" data-i18n="fetch" data-i18n-title="fetchTitle"></button>
        </span>
      </label>
      <label><span data-i18n="htmlLabel"></span>
        <textarea id="html" rows="9" spellcheck="false" data-i18n-placeholder="htmlPlaceholder"></textarea>
      </label>
      <div class="demo-row">
        <button class="link" id="demo-good" type="button" data-i18n="demoGood"></button>
        <button class="link" id="demo-bad" type="button" data-i18n="demoBad"></button>
      </div>
      <details>
        <summary data-i18n="providerSummary"></summary>
        <div class="provider-grid">
          <label><span data-i18n="providerLabel"></span>
            <select id="provider">
              <option value="deterministic" data-i18n="providerOffline"></option>
              <option value="openai">OpenAI</option>
              <option value="gemini">Gemini</option>
              <option value="anthropic">Claude</option>
              <option value="deepseek">DeepSeek</option>
            </select>
          </label>
          <label><span data-i18n="modelLabel"></span>
            <input id="model" type="text" data-i18n-placeholder="modelPlaceholder" spellcheck="false">
          </label>
        </div>
        <p class="note" data-i18n="providerNote"></p>
      </details>
      <button class="primary" id="run" type="button" data-i18n="audit"></button>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </section>

    <section class="results">
      <div id="empty" class="empty">
        <h2 data-i18n="emptyTitle"></h2>
        <p data-i18n="emptyBody"></p>
      </div>

      <div id="result" hidden>
        <div class="hero">
          <svg id="dial" class="dial" viewBox="0 0 132 132" role="img"></svg>
          <div class="hero-side">
            <h2 id="product-title"></h2>
            <p id="product-url" class="muted"></p>
            <div id="pillars" class="pillars"></div>
            <p class="note score-note" data-i18n="scoreNote"></p>
          </div>
        </div>
        <div id="caps"></div>

        <div id="summary" class="summary"></div>

        <div class="trace-wrap"><div id="trace" class="trace"></div></div>

        <nav class="tabs" role="tablist">
          <button class="tab is-active" data-tab="findings" type="button"><span data-i18n="tabFindings"></span> <span id="findings-count" class="count"></span></button>
          <button class="tab" data-tab="questions" type="button"><span data-i18n="tabQuestions"></span> <span id="questions-count" class="count"></span></button>
          <button class="tab" data-tab="fixes" type="button"><span data-i18n="tabFixes"></span></button>
          <button class="tab" data-tab="evidence" type="button"><span data-i18n="tabEvidence"></span></button>
        </nav>

        <section id="panel-findings" class="panel"></section>

        <section id="panel-questions" class="panel" hidden>
          <p class="note" data-i18n="questionsNote"></p>
          <div id="questions"></div>
          <button class="primary" id="resume" type="button" hidden data-i18n="resume"></button>
        </section>

        <section id="panel-fixes" class="panel" hidden>
          <p class="note" data-i18n="fixesNote"></p>
          <button class="primary" id="draft" type="button" data-i18n="draft"></button>
          <div id="changes"></div>
          <div id="validation"></div>
          <div id="jsonld-wrap" hidden>
            <div class="row-between">
              <h3 data-i18n="jsonldTitle"></h3>
              <button class="secondary" id="copy-jsonld" type="button" data-i18n="copy"></button>
            </div>
            <pre id="jsonld"></pre>
          </div>
        </section>

        <section id="panel-evidence" class="panel" hidden>
          <table>
            <thead><tr>
              <th data-i18n="evId"></th><th data-i18n="evField"></th>
              <th data-i18n="evValue"></th><th data-i18n="evSource"></th>
            </tr></thead>
            <tbody id="evidence"></tbody>
          </table>
        </section>

        <section class="chat-card">
          <h3 data-i18n="chatTitle"></h3>
          <div id="chat-log" class="chat-log" aria-live="polite"></div>
          <div class="chat-row">
            <input id="chat-input" type="text" spellcheck="false" data-i18n-placeholder="chatPlaceholder">
            <button class="secondary" id="chat-send" type="button" data-i18n="ask"></button>
          </div>
          <p class="note" data-i18n="chatNote"></p>
        </section>

        <div class="actions">
          <button class="secondary" id="download-report" type="button" data-i18n="downloadReport"></button>
          <button class="secondary" id="download-json" type="button" data-i18n="downloadJson"></button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span data-i18n="footerLeft"></span>
    <span data-i18n="footerRight"></span>
  </footer>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
