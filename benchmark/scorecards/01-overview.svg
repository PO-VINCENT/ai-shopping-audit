<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="shade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111F" stop-opacity="0.54"/>
      <stop offset="1" stop-color="#07111F" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF5C65"/>
      <stop offset="1" stop-color="#FF8A65"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <image href="scorecard-bg.png" width="1600" height="900" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1600" height="900" fill="url(#shade)"/>

  <text x="120" y="92" fill="#B7F34A" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="25" letter-spacing="3">CATALOGREADY BENCHMARK · JULY 2026</text>
  <text x="120" y="174" fill="#F7FAFF" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="72">50 real product pages.</text>
  <text x="120" y="255" fill="#F7FAFF" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="72">80% are not AI-shopping ready.</text>
  <text x="120" y="306" fill="#9CB0C7" font-family="Arial, Helvetica, sans-serif" font-size="25">One GET per page · deterministic rules · no model · 50 different domains</text>

  <g filter="url(#shadow)">
    <rect x="120" y="365" width="1360" height="330" rx="30" fill="#081625" fill-opacity="0.92" stroke="#1A4261" stroke-width="2"/>
  </g>
  <text x="180" y="425" fill="#9CB0C7" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="2">THE RESULT</text>

  <text x="180" y="548" fill="#FF6670" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="116">40</text>
  <text x="365" y="506" fill="#F7FAFF" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="38">NEEDS WORK</text>
  <text x="365" y="552" fill="#9CB0C7" font-family="Arial, Helvetica, sans-serif" font-size="25">of 50 audited pages</text>

  <line x1="785" y1="435" x2="785" y2="625" stroke="#1A4261" stroke-width="2"/>

  <text x="855" y="548" fill="#B7F34A" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="116">10</text>
  <text x="1040" y="506" fill="#F7FAFF" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="38">READY</text>
  <text x="1040" y="552" fill="#9CB0C7" font-family="Arial, Helvetica, sans-serif" font-size="25">passed readiness threshold</text>

  <rect x="180" y="605" width="1240" height="24" rx="12" fill="#112A3E"/>
  <rect x="180" y="605" width="992" height="24" rx="12" fill="url(#bar)"/>
  <rect x="1172" y="605" width="248" height="24" rx="12" fill="#B7F34A"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="120" y="735" width="280" height="70" rx="18" fill="#0B1D2E" stroke="#174362"/>
    <text x="150" y="779" fill="#F7FAFF" font-size="26" font-weight="700">50 AUDITED</text>
    <rect x="430" y="735" width="280" height="70" rx="18" fill="#0B1D2E" stroke="#174362"/>
    <text x="460" y="779" fill="#21D4FD" font-size="26" font-weight="700">0 BLOCKED</text>
    <rect x="740" y="735" width="280" height="70" rx="18" fill="#0B1D2E" stroke="#174362"/>
    <text x="770" y="779" fill="#F7FAFF" font-size="26" font-weight="700">SCORE 1–91</text>
    <rect x="1050" y="735" width="430" height="70" rx="18" fill="#0B1D2E" stroke="#174362"/>
    <text x="1080" y="779" fill="#F7FAFF" font-size="26" font-weight="700">5 CATEGORIES · 10 EACH</text>
  </g>
  <text x="120" y="860" fill="#70869D" font-family="Arial, Helvetica, sans-serif" font-size="20">Readiness measures fetched static HTML—not product quality, popularity, or observed AI ranking.</text>
</svg>
